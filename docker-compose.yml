services:
  postgres:
    image: postgres:16-alpine
    networks:
      - app-network
    environment:
      POSTGRES_DB: ${DB_DATABASE:-hr_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-hr_db}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    networks:
      - app-network
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management-alpine
    networks:
      - app-network
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  soketi:
    image: quay.io/soketi/soketi:latest
    networks:
      - app-network
    environment:
      SOKETI_DEBUG: "1"
      SOKETI_DEFAULT_APP_ID: app-id
      SOKETI_DEFAULT_APP_KEY: app-key
      SOKETI_DEFAULT_APP_SECRET: app-secret
    ports:
      - "6001:6001"
      - "9601:9601"

  hr-service:
    build:
      context: ./hr-service
      dockerfile: docker/Dockerfile
    container_name: hr_service
    restart: always
    ports:
      - "8081:80"
    env_file:
      - ./hr-service/.env
    environment:
      APP_URL: http://localhost:8081
      DB_HOST: postgres
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
    volumes:
      - ./hr-service:/var/www/html
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  hub-service:
    build:
      context: ./hub-service
      dockerfile: docker/Dockerfile
    container_name: hub_service
    restart: always
    ports:
      - "8082:80"
    env_file:
      - ./hub-service/.env
    environment:
      APP_URL: http://localhost:8082
      DB_HOST: postgres
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
    volumes:
      - ./hub-service:/var/www/html
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge